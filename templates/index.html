<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TODO</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="header">
        <h1>To Do List</h1>
        <img id="book" src="http://dl.glitter-graphics.net/pub/640/640381u02ck4kwdg.gif" width=31 height=24 border=0>
    </div>

    <div class="table-container">
    <table>
        <tr>
            <th>Task</th>
            <th>Date</th>
            <th></th>
        </tr>
        {% for task in tasks %}
        <tr class="task">
            <td> {{ task.content }} </td>
            <td> {{ task.date_created.date() }} </td>
            <td> <a href="/delete/{{ task.id }}"> ✘ </a> </td>
        </tr>
        {% endfor %}
    </table>
    </div>
    <form action="/" method="POST">
        <input type="text" name="content" id="content" required>
        <input type="submit" id="submit" value="Add Task">
    </form>


</body>

</html>
